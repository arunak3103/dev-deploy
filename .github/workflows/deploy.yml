name: Deploy to EKS

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Configure AWS Credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: YOUR_AWS_ROLE_ARN
        aws-region: us-east-1

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-east-1 \
        | docker login --username AWS --password-stdin YOUR_ECR_URI

    - name: Build Image
      run: |
        docker build -t devops-app .

    - name: Tag Image
      run: |
        docker tag devops-app:latest COMPANY_ECR_URI:latest

    - name: Push Image
      run: |
        docker push YOUR_ECR_URI:latest

    - name: Update Kubeconfig
      run: |
        aws eks update-kubeconfig --region us-east-1 --name COMPANY_CLUSTER_NAME

    - name: Deploy to Kubernetes (Dev)
      run: |
        sed -i "s|IMAGE_PLACEHOLDER|YOUR_ECR_URI:latest|g" k8s/dev/deployment.yaml
        kubectl apply -f k8s/qa/